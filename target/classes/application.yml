# Azure Web App profile — values injected via App Service > Configuration > Application settings
# Set these environment variables in Azure:
#   DB_HOST         → Azure Database for MySQL flexible server hostname
#   DB_PORT         → 3306
#   DB_NAME         → koha_simulator
#   DB_USER         → adminuser@<server-name>  (or just adminuser for flexible server)
#   DB_PASSWORD     → <your password>
#   DB_SSL          → true
#   JWT_SECRET      → <strong random string, min 32 chars>
#   JWT_EXPIRATION_HOURS → 8
#   DEFAULT_LOAN_DAYS    → 21

server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5

  jpa:
    show-sql: false

logging:
  level:
    com.robotica.kohasimulator: INFO
    root: WARN

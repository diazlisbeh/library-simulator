server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: koha-simulator

  datasource:
    url: jdbc:mysql://localhost:3306/koha_simulator
    username: root
    password: password123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 100
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

koha:
  jwt:
    secret: ${JWT_SECRET:KohaSimulatorSecretKey2024ChangeInProductionAtLeast32Chars}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  checkout:
    default-loan-days: ${DEFAULT_LOAN_DAYS:21}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.robotica.kohasimulator: INFO
    org.springframework.security: WARN

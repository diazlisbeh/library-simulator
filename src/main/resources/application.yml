server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: koha-simulator

  datasource:
    url: jdbc:sqlite:${DB_PATH:./koha.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1          # SQLite solo soporta un escritor a la vez
      connection-timeout: 30000
      connection-init-sql: "PRAGMA foreign_keys = ON"

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

koha:
  jwt:
    secret: ${JWT_SECRET:KohaSimulatorSecretKey2024ChangeInProductionAtLeast32Chars}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  checkout:
    default-loan-days: ${DEFAULT_LOAN_DAYS:21}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.robotica.kohasimulator: INFO
    org.springframework.security: WARN
